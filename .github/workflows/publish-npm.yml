name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No registry-url — omitting it lets npm use OIDC Trusted Publishing directly.
          # registry-url would write an .npmrc expecting NODE_AUTH_TOKEN, conflicting with OIDC.

      - name: Publish to npm
        # Authentication is handled by npm's OIDC Trusted Publishing — no token needed.
        # Setup: npmjs.com → chessmatrix → Settings → Publishing → Trusted Publisher
        #   GitHub owner: hacker6284  repo: ChessMatrix  workflow: publish-npm.yml
        run: npm publish --access public --provenance
