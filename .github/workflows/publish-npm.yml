name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Clear placeholder auth token written by setup-node
        # setup-node writes _authToken=${NODE_AUTH_TOKEN} to .npmrc; if that env var is
        # unset the literal placeholder blocks npm's built-in OIDC Trusted Publishing flow.
        run: npm config delete //registry.npmjs.org/:_authToken

      - name: Publish to npm
        # Authentication is handled by npm's OIDC Trusted Publishing — no stored token needed.
        # Setup: npmjs.com → chessmatrix → Settings → Publishing → Trusted Publisher
        #   GitHub owner: hacker6284  repo: ChessMatrix  workflow: publish-npm.yml
        run: npm publish --access public --provenance
