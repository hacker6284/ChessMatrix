name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        # OIDC Trusted Publishing requires npm >= 11.5.1; Node 22 ships with an older version.
        run: npm install -g npm@latest

      - name: Publish to npm
        # NODE_AUTH_TOKEN must not be set — OIDC Trusted Publishing handles auth automatically.
        # Setup: npmjs.com → chessmatrix → Settings → Publishing → Trusted Publisher
        #   GitHub owner: hacker6284  repo: ChessMatrix  workflow: publish-npm.yml
        # Version in package.json is bumped and committed before tagging — no sync needed.
        run: npm publish --access public --provenance
